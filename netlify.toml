# netlify.toml
# Routes /api/chat and /api/lookup to the same Netlify function

[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/lookup"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/cmo-tool"
  to   = "/ai-marketing-strategy-tool"
  status = 301

[[redirects]]
  from = "/cmo-tool.html"
  to   = "/ai-marketing-strategy-tool"
  status = 301
